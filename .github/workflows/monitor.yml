name: PIMAC 공고 모니터링

on:
  schedule:
    # 매일 한국시간 오전 7시 = UTC 22:00 (전날)
    - cron: "0 22 * * *"
  workflow_dispatch:
    # 수동 실행 버튼 (테스트용)
    inputs:
      force_notify:
        description: "신규 공고가 없어도 텔레그램 테스트 메시지 전송"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  monitor:
    name: 공고 목록 확인 및 알림
    runs-on: ubuntu-latest
    permissions:
      contents: write  # data/*.json 커밋을 위해 필요

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 공고 모니터링 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_NOTIFY: ${{ inputs.force_notify || 'false' }}
        run: python scripts/monitor.py

      - name: 변경된 데이터 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 변경사항이 있을 때만 커밋
          if ! git diff --cached --quiet; then
            git commit -m "chore: PIMAC 공고 목록 업데이트 ($(date +'%Y-%m-%d %H:%M KST' -d '+9 hours'))"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi
